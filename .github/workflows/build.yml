name: Build

on:
  push:
    branches: [ "main", "dev", "ci" ]
    paths-ignore:
      - '**.md'
      - '.github/**'
      - '!.github/workflows/build.yml'
  pull_request:
    branches: [ "main", "dev" ]
    paths-ignore:
      - '**.md'
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      artifact-metadata: write
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_HARDLINK: "true"
      CCACHE_NOHASHDIR: "true"
      CCACHE_MAXSIZE: "10G"
    steps:
      - uses: actions/checkout@v6

      - name: Ensure Xray core AAR
        run: |
          set -euo pipefail
          LIB_PATH="TMessagesProj/libs/libv2ray.aar"
          if [ -f "$LIB_PATH" ]; then
            echo "Using bundled $LIB_PATH"
            exit 0
          fi

          URL="https://github.com/2dust/AndroidLibV2rayLite/releases/latest/download/libv2ray.aar"
          echo "Downloading libv2ray.aar from: $URL"

          mkdir -p TMessagesProj/libs
          curl -L --fail --retry 3 --retry-delay 3 "$URL" -o "$LIB_PATH"

          if [ ! -s "$LIB_PATH" ]; then
            echo "Downloaded libv2ray.aar is empty"
            exit 1
          fi

          if ! unzip -tq "$LIB_PATH" >/dev/null 2>&1; then
            echo "Downloaded file is not a valid AAR. Check the upstream URL or manually place libv2ray.aar into TMessagesProj/libs/"
            exit 1
          fi

          echo "libv2ray.aar is ready"

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "build-tools;36.1.0 ndk;27.3.13750724 platforms;android-36"

      - name: Configure Gradle
        run: |
          mkdir -p ~/.gradle
          echo 'org.gradle.caching=true' >> ~/.gradle/gradle.properties
          echo 'org.gradle.parallel=true' >> ~/.gradle/gradle.properties
          echo 'org.gradle.jvmargs=-Xmx8192m -Dfile.encoding=UTF-8 -XX:+UseParallelGC' >> ~/.gradle/gradle.properties
          echo 'android.native.buildOutput=verbose' >> ~/.gradle/gradle.properties

      - name: Configure Signing
        if: github.event_name != 'pull_request'
        run: |
          echo "storeFile=${{ github.workspace }}/keystore.jks" >> local.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> local.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> local.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> local.properties
          
          echo "${{ secrets.KEYSTORE_JKS }}" | base64 --decode > keystore.jks

      - name: Configure Secrets
        if: github.event_name != 'pull_request'
        run: |
          echo "apiId=${{ secrets.API_ID }}" >> local.properties
          echo "apiHash=${{ secrets.API_HASH }}" >> local.properties
          echo "helperBotId=${{ secrets.HELPER_BOT_ID }}" >> local.properties
          echo "helperBotUsername=${{ secrets.HELPER_BOT_USERNAME }}" >> local.properties

      - name: Configure Build
        run: |
          echo "twpicBotUsername=${{ secrets.TWPIC_BOT_USERNAME }}" >> local.properties

          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > TMessagesProj_App/google-services.json

      - name: Build with Gradle (Debug)
        if: github.event_name == 'pull_request'
        run: |
          ./gradlew :TMessagesProj_App:assembleDebug

      - name: Build with Gradle
        if: github.event_name != 'pull_request'
        run: |
          ./gradlew :TMessagesProj_App:assembleRelease
          ./gradlew :TMessagesProj_App:bundleRelease

      - name: Attest
        if: github.event_name != 'pull_request'
        uses: actions/attest@v4
        with:
          subject-path: '${{ github.workspace }}/TMessagesProj_App/build/outputs'

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: outputs
          path: TMessagesProj_App/build/outputs

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: outputs
          path: outputs

      - name: Locate ARM64 APK
        id: locate_apk
        run: |
          APK_PATH=$(find outputs/apk/release -name "*arm64-v8a*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ARM64 APK not found, trying any release APK..."
            APK_PATH=$(find outputs/apk/release -name "*.apk" -type f | head -1)
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$(basename $APK_PATH)" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"

      - name: Generate Checksums
        id: checksums
        run: |
          APK_PATH="${{ steps.locate_apk.outputs.apk_path }}"
          SHA256=$(sha256sum "$APK_PATH" | awk '{print $1}')
          MD5=$(md5sum "$APK_PATH" | awk '{print $1}')
          FILE_SIZE=$(stat -c%s "$APK_PATH" | numfmt --to=iec)
          
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "md5=$MD5" >> $GITHUB_OUTPUT
          echo "size=$FILE_SIZE" >> $GITHUB_OUTPUT

      - name: Get Commit Info
        id: commit_info
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B | head -1)
          COMMIT_HASH=$(git rev-parse --short HEAD)
          COMMIT_FULL=$(git rev-parse HEAD)
          
          # Sanitize commit message for release title
          SANITIZED=$(echo "$COMMIT_MSG" | sed 's/["<>]//g' | cut -c1-100)
          
          echo "title=$SANITIZED" >> $GITHUB_OUTPUT
          echo "hash_short=$COMMIT_HASH" >> $GITHUB_OUTPUT
          echo "hash_full=$COMMIT_FULL" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: "${{ steps.commit_info.outputs.title }}"
          tag_name: "${{ steps.commit_info.outputs.hash_short }}"
          body: |
            ## Build Info
            - **Commit:** `${{ steps.commit_info.outputs.hash_full }}`
            - **Short Hash:** `${{ steps.commit_info.outputs.hash_short }}`
            - **Branch:** `${{ github.ref_name }}`
            - **Build Date:** ${{ github.event.head_commit.timestamp }}

            ## APK Details
            - **File:** `${{ steps.locate_apk.outputs.apk_name }}`
            - **Size:** ${{ steps.checksums.outputs.size }}

            ## Checksums
            | Algorithm | Hash |
            |-----------|------|
            | SHA256 | `${{ steps.checksums.outputs.sha256 }}` |
            | MD5 | `${{ steps.checksums.outputs.md5 }}` |
          files: |
            ${{ steps.locate_apk.outputs.apk_path }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
